<!DOCTYPE html>
<html lang="ko">
<body>
    <input type="text" id="searchInput" placeholder="종목명 입력" oninput="searchStock()">
    <div id="results"></div>
    <div id="data"></div>

    <script>
        // 네이버 금융 검색 연동
        async function searchStock() {
            const query = document.getElementById('searchInput').value;
            if (query.length < 2) return;
            const res = await fetch(`https://ac.finance.naver.com/ac?q=${query}&st=111&r_format=json`);
            const data = await res.json();
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = '';
            data.items[0].forEach(item => {
                const btn = document.createElement('button');
                btn.innerText = item[0];
                btn.onclick = () => getStockData(item[1]);
                resDiv.appendChild(btn);
            });
        }

        async function getStockData(code) {
            const res = await fetch(`/api/search?code=${encodeURIComponent(code)}`);
            const data = await res.json();
            document.getElementById('data').innerHTML = `외인: ${data.frgn_ntby_qty} / 기관: ${data.orgn_ntby_qty}`;
        }
    </script>
</body>
</html>
