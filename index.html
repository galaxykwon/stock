<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주식 동향</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📊 종목 검색</h1>
        <input type="text" id="searchInput" placeholder="종목명 입력">
        <button onclick="searchStock()">검색</button>
        <div id="results"></div>
    </div>

    <div class="box">
        <h1>📈 전일 순매수 TOP 10</h1>
        <button onclick="loadRank('1', '9000')">코스피 외인</button>
        <button onclick="loadRank('2', '9000')">코스닥 외인</button>
        <div id="rankData"></div>
    </div>

    <script>
        // 검색 실행
        async function searchStock() {
            const query = document.getElementById('searchInput').value;
            const res = await fetch(`/api/search?code=${encodeURIComponent(query)}`);
            const data = await res.json();
            document.getElementById('results').innerHTML = 
                data.frgn_ntby_qty ? `외국인: ${data.frgn_ntby_qty}주 / 기관: ${data.orgn_ntby_qty}주` : "조회 실패";
        }

        // 순위 조회
        async function loadRank(market, investor) {
            const res = await fetch(`/api/rank?market=${market}&investor=${investor}`);
            const data = await res.json();
            document.getElementById('rankData').innerHTML = 
                data.map(item => `<div>${item.hts_kor_isnm}: ${item.ntby_qty}주</div>`).join('');
        }
    </script>
</body>
</html>
