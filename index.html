<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 매매동향 대시보드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f4; color: #333; margin: 0; padding: 30px; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 25px; border-radius: 6px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        h1, h2 { color: #111; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.2rem; }
        .search-box { margin-bottom: 30px; }
        input[type="text"] { padding: 10px; width: 200px; border: 1px solid #bbb; border-radius: 4px; }
        button { padding: 10px 15px; border: none; background-color: #444; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #222; }
        .grid-container { display: flex; gap: 20px; }
        .column { flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eaeaea; text-align: left; font-size: 0.95rem; }
        th { background-color: #f9f9f9; color: #555; }
        .result-box { padding: 15px; background: #fafafa; border: 1px solid #eee; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 종목별 매수세 검색 (실시간)</h1>
        <div class="search-box">
            <input type="text" id="stockCode" placeholder="종목코드 6자리 입력">
            <button onclick="searchStock()">검색</button>
            <div id="searchResult" class="result-box">대기 중...</div>
        </div>

        <h1>📈 전일 기준 순매수 TOP 10 (09:00 업데이트)</h1>
        <div class="grid-container">
            <div class="column">
                <h2>기관 순매수 상위</h2>
                <button onclick="loadRank('0001', '8000')">코스피</button>
                <button onclick="loadRank('1001', '8000')">코스닥</button>
                <table id="instTable">
                    <thead><tr><th>순위</th><th>종목명</th><th>순매수량</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="column">
                <h2>외국인 순매수 상위</h2>
                <button onclick="loadRank('0001', '9000')">코스피</button>
                <button onclick="loadRank('1001', '9000')">코스닥</button>
                <table id="foreignTable">
                    <thead><tr><th>순위</th><th>종목명</th><th>순매수량</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function searchStock() {
            const code = document.getElementById('stockCode').value;
            if(!code) return alert("종목코드를 입력하세요.");
            
            document.getElementById('searchResult').innerText = "데이터 불러오는 중...";
            const res = await fetch(`/api/search?code=${code}`);
            const data = await res.json();
            
            document.getElementById('searchResult').innerHTML = 
                `<strong>종목코드:</strong> ${data.stock} &nbsp;&nbsp;|&nbsp;&nbsp; 
                 <strong>외국인:</strong> ${data.foreign} &nbsp;&nbsp;|&nbsp;&nbsp; 
                 <strong>기관:</strong> ${data.institution} &nbsp;&nbsp;|&nbsp;&nbsp; 
                 <strong>개인:</strong> ${data.retail}`;
        }

        async function loadRank(market, investor) {
            const tbodyId = investor === '8000' ? 'instTable' : 'foreignTable';
            const tbody = document.querySelector(`#${tbodyId} tbody`);
            tbody.innerHTML = "<tr><td colspan='3'>로딩 중...</td></tr>";

            const res = await fetch(`/api/rank?market=${market}&investor=${investor}`);
            const data = await res.json();
            
            tbody.innerHTML = "";
            data.forEach(item => {
                tbody.innerHTML += `<tr><td>${item.rank}</td><td>${item.name}</td><td>${item.volume}</td></tr>`;
            });
        }
    </script>
</body>
</html>
